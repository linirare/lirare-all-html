<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>永夜降臨：雙面魅影 - 玩家聊天数据分析报告</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#0f0f1a; color:#e0e0e0; font-family:'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
  padding:20px;
}
.container { max-width:1200px; margin:0 auto; }
.header {
  text-align:center; padding:40px 20px;
  background:linear-gradient(135deg,#1a1a3e,#0f0f1a); border-radius:16px; margin-bottom:30px;
}
.header h1 { font-size:2em; color:#c084fc; margin-bottom:8px; }
.header p { color:#888; font-size:0.95em; }
.header .stats { display:flex; justify-content:center; gap:40px; margin-top:25px; flex-wrap:wrap; }
.stat-item { text-align:center; }
.stat-item .num { font-size:2.5em; font-weight:bold; color:#f0c040; }
.stat-item .label { color:#aaa; font-size:0.85em; margin-top:4px; }

.section { background:#1a1a2e; border-radius:12px; padding:24px; margin-bottom:20px; }
.section h2 { color:#c084fc; font-size:1.2em; margin-bottom:16px; border-left:3px solid #c084fc; padding-left:12px; }

.chart-row { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
@media(max-width:768px){ .chart-row { grid-template-columns:1fr; } }
.chart-box { background:#16162a; border-radius:8px; padding:16px; }
.chart-box h3 { color:#aaa; font-size:0.9em; margin-bottom:12px; }
.chart-box canvas { max-height:300px; }

table { width:100%; border-collapse:collapse; font-size:0.9em; }
th,td { padding:8px 12px; text-align:left; border-bottom:1px solid #2a2a40; }
th { color:#c084fc; font-weight:600; }
tr:hover td { background:#1f1f38; }
.rank-num { color:#f0c040; font-weight:bold; width:30px; }

.badge { display:inline-block; padding:2px 8px; border-radius:4px; font-size:0.8em; }
.badge-topic { background:#2d1b69; color:#c084fc; }
.badge-neg { background:#691b1b; color:#fc8484; }

.tag-cloud { display:flex; flex-wrap:wrap; gap:8px; }
.tag { padding:4px 12px; border-radius:20px; background:#2a2a40; color:#ccc; font-size:0.85em; }
.tag.hot { background:#3d2b69; color:#c084fc; font-size:1.1em; font-weight:bold; }
.tag.warm { background:#3d3520; color:#f0c040; }

.neg-msg { background:#1f1f2e; border-left:3px solid #fc8484; padding:10px 14px; margin:6px 0; border-radius:4px; font-size:0.88em; }
.neg-msg .name { color:#fc8484; font-weight:500; }
.neg-msg .text { color:#ccc; margin-top:2px; }

.topic-bar { display:flex; gap:8px; align-items:center; margin:6px 0; }
.topic-bar .label { width:80px; font-size:0.85em; color:#aaa; }
.topic-bar .bar-bg { flex:1; height:20px; background:#222; border-radius:10px; overflow:hidden; }
.topic-bar .bar-fill { height:100%; border-radius:10px; transition:width 0.6s; }
.topic-bar .pct { width:50px; text-align:right; font-size:0.85em; color:#aaa; }

.footer { text-align:center; padding:20px; color:#555; font-size:0.8em; }
</style>
</head>
<body>
<div class="container">

<div class="header">
  <h1>🕯️ 永夜降臨：雙面魅影</h1>
  <p>玩家聊天数据分析报告 · 2026.05.28 - 2026.05.29</p>
  <div class="stats">
    <div class="stat-item"><div class="num" id="statTotal">-</div><div class="label">总消息量</div></div>
    <div class="stat-item"><div class="num" id="statPlayers">-</div><div class="label">发言玩家</div></div>
    <div class="stat-item"><div class="num" id="statNeg">-</div><div class="label">吐槽消息</div></div>
    <div class="stat-item"><div class="num" id="statPeak">-</div><div class="label">高峰时段</div></div>
  </div>
</div>

<div class="section">
  <h2>⏰ 时段活跃分布</h2>
  <div class="chart-box">
    <canvas id="hourlyChart"></canvas>
  </div>
</div>

<div class="chart-row">
  <div class="section">
    <h2>💬 聊天类型</h2>
    <div class="chart-box">
      <canvas id="chatTypeChart"></canvas>
    </div>
  </div>
  <div class="section">
    <h2>📢 注册渠道分布</h2>
    <div class="chart-box">
      <canvas id="channelChart"></canvas>
    </div>
  </div>
</div>

<div class="section">
  <h2>🏆 活跃玩家 TOP15</h2>
  <table>
    <thead><tr><th>#</th><th>玩家</th><th>发言数</th><th>占比</th></tr></thead>
    <tbody id="playerTable"></tbody>
  </table>
</div>

<div class="chart-row">
  <div class="section">
    <h2>🔥 热点话题分布</h2>
    <div id="topicBars"></div>
  </div>
  <div class="section">
    <h2>🏷️ 高频关键词 TOP20</h2>
    <div class="tag-cloud" id="tagCloud"></div>
  </div>
</div>

<div class="section">
  <h2>⚠️ 负面反馈抽样（共<span id="negTotal">-</span>条）</h2>
  <div id="negList"></div>
</div>

<div class="footer">
  数据来源：游戏内聊天日志 | 报告生成：2026-05-29
</div>

</div>

<script>
let data;
fetch('./data.json').then(r=>r.json()).then(d=>{
  data = d;
  render();
}).catch(e=>{
  document.body.innerHTML = '<p style="text-align:center;margin-top:100px;color:red;">数据加载失败: '+e.message+'</p>';
});

function render(){
  const d = data;

  // Stats
  document.getElementById('statTotal').textContent = d.total;
  document.getElementById('statPlayers').textContent = d.players;
  document.getElementById('statNeg').textContent = d.negCount;
  document.getElementById('statPeak').textContent = d.peakHour + ':00';

  // Hourly chart
  const hours = Object.keys(d.hourly).map(h => h + ':00');
  const vals = Object.values(d.hourly);
  new Chart(document.getElementById('hourlyChart'), {
    type: 'bar',
    data: {
      labels: hours,
      datasets: [{
        label: '消息数',
        data: vals,
        backgroundColor: vals.map(v => v === Math.max(...vals) ? '#f0c040' : '#4a4a8a'),
        borderRadius: 4,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color:'#888', maxRotation:0 }, grid: { color:'#222' } },
        y: { ticks: { color:'#888' }, grid: { color:'#222' } }
      }
    }
  });

  // Chat type pie
  const ctLabels = Object.keys(d.chatType);
  const ctVals = Object.values(d.chatType);
  const ctColors = ['#7c5cbf','#3a86ff','#ff6b6b','#f0c040'];
  new Chart(document.getElementById('chatTypeChart'), {
    type: 'doughnut',
    data: {
      labels: ctLabels,
      datasets: [{
        data: ctVals,
        backgroundColor: ['#7c5cbf','#3a86ff','#ff6b6b','#f0c040'],
        borderWidth: 0,
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { position:'bottom', labels: { color:'#aaa', padding:12 } }
      }
    }
  });

  // Channel pie
  const chLabels = Object.keys(d.channels);
  const chVals = Object.values(d.channels);
  const chColors = ['#7c5cbf','#3a86ff','#ff6b6b','#f0c040','#51cf66','#cc5de8'];
  new Chart(document.getElementById('channelChart'), {
    type: 'doughnut',
    data: {
      labels: chLabels,
      datasets: [{
        data: chVals,
        backgroundColor: chColors,
        borderWidth: 0,
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { position:'bottom', labels: { color:'#aaa', padding:12 } }
      }
    }
  });

  // Player table
  const tbody = document.getElementById('playerTable');
  d.topPlayers.forEach((p, i) => {
    const pct = (p.count / d.total * 100).toFixed(1);
    tbody.innerHTML += `<tr>
      <td class="rank-num">${i+1}</td>
      <td>${p.name}</td>
      <td>${p.count}</td>
      <td>${pct}%</td>
    </tr>`;
  });

  // Topic bars
  const topicDiv = document.getElementById('topicBars');
  const topicColors = { '玩法/攻略':'#7c5cbf','吐槽/BUG':'#ff6b6b','活动/充值':'#f0c040','坐标分享':'#3a86ff','社交/组队':'#51cf66' };
  const maxTopic = Math.max(...Object.values(d.topics));
  Object.entries(d.topics).forEach(([k,v]) => {
    const pct = (v / d.total * 100).toFixed(1);
    const w = (v / maxTopic * 100).toFixed(0);
    topicDiv.innerHTML += `<div class="topic-bar">
      <div class="label">${k}</div>
      <div class="bar-bg"><div class="bar-fill" style="width:${w}%;background:${topicColors[k]||'#7c5cbf'}"></div></div>
      <div class="pct">${pct}%</div>
    </div>`;
  });

  // Tag cloud
  const tagDiv = document.getElementById('tagCloud');
  const maxWc = Math.max(...d.topWords.map(w => w.count));
  d.topWords.forEach(w => {
    const ratio = w.count / maxWc;
    const cls = ratio > 0.6 ? 'tag hot' : ratio > 0.3 ? 'tag warm' : 'tag';
    tagDiv.innerHTML += `<span class="${cls}">${w.word}</span>`;
  });

  // Negative samples
  document.getElementById('negTotal').textContent = d.negCount;
  const negDiv = document.getElementById('negList');
  d.negSamples.forEach(s => {
    negDiv.innerHTML += `<div class="neg-msg"><span class="name">${s.name}</span><div class="text">${s.msg}</div></div>`;
  });
}
</script>
</body>
</html>
