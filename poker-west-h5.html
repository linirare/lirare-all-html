function initState(){return{coins:2600,gems:460,rank:820,rankIdx:0,stars:0,points:1000,newbieGames:0,total:0,wins:0,streak:0,maxStreak:0,chest:0,autoPlay:false,difficulty:1,activeChar:'cowboy',equipped:['bomb','magician'],skills:{bomb:{copies:6,uses:0},magician:{copies:4,uses:0},intel:{copies:4,uses:0},plusminus:{copies:4,uses:0},lock:{copies:3,uses:0},god:{copies:2,uses:0},glove:{copies:3,uses:0},recycle:{copies:3,uses:0}},chars:{cowboy:{owned:true,lv:1,shards:0},sheriff:{owned:true,lv:1,shards:0},lily:{owned:false,lv:1,shards:0},miner:{owned:false,lv:1,shards:0}},tasks:{play:0,useSkill:0,winRound:0,straight:0},firstVisit:true,taskDate:'',history:[]}}

function load(){try{state=JSON.parse(localStorage.getItem(LS))||initState()}catch(e){state=initState()}for(const id of ['bomb','magician','intel','plusminus','glove','recycle'])state.skills[id]??={copies:3,uses:0};state.chars.cowboy??={owned:true,lv:1,shards:0};state.autoPlay??=false;state.difficulty??=1;state.rankIdx??=0;state.stars??=0;state.points??=1000;state.newbieGames??=0;state.streak??=0;state.maxStreak??=state.streak||0;state.firstVisit??=(state.total===0);state.taskDate??='';checkDailyReset();if(state.firstVisit){state.firstVisit=false;save();setTimeout(startTutorial,500)}save()}

function rankProgressText(){const c=rankCfg();if((state.rankIdx||0)===0)return `${state.newbieGames||0}/3 场保护期`;if((state.rankIdx||0)>=5)return `${state.points||1000} 分`;return `${state.stars||0}/${c.stars} 星`}
function setScreen(s){render(s)}
function render(screen='home'){renderNav(screen);if(screen==='home')renderHome();if(screen==='deck')renderDeck();if(screen==='battleSelect')renderBattleSelect();if(screen==='chars')renderChars();if(screen==='shop')renderShop();if(screen==='rank')renderRank();if(screen==='teach')renderTeach()}
function renderNav(active){const items=[['home','🏠','主页'],['deck','🃏','功能牌'],['chars','🌟','角色'],['shop','🎁','抽卡'],['rank','🏆','排行']];q('#nav').innerHTML=items.map(i=>`<button class="${active===i[0]?'active':''}" onclick="setScreen('${i[0]}')"><b>${i[1]}</b>${i[2]}</button>`).join('')}
function topbar(title,sub=''){return `<div class="topbar"><div><div class="title">${title}</div>${sub?`<div class="sub">${sub}</div>`:''}</div><div class="res"><span class="pill">🪙 ${state.coins}</span><span class="pill">💎 ${state.gems}</span></div></div>`}
function renderHome(){const winrate=state.total?Math.round(state.wins/state.total*100):0;const rc=rankCfg();q('#app').innerHTML=`${topbar('代号001')}
<div class="heroArt" style="min-height:140px;height:140px"><div class="saloonSign">CODE 001</div><div class="heroCowboy"></div></div>
<div class="btn mint" onclick="state.mode='normal';setScreen('battleSelect')" style="padding:16px 0;font-size:18px;margin:10px 0">🃏 开始对战</div>
<div class="grid3"><div class="btn dark" onclick="startTutorial()" style="padding:10px 0;font-size:12px">📖 新手引导</div><div class="btn dark" onclick="setScreen('teach')" style="padding:10px 0;font-size:12px">🏆 牌型教学</div><div class="btn dark" onclick="setScreen('rank')" style="padding:10px 0;font-size:12px">📊 天梯排行</div></div>
<div class="panel"><b>今日进度</b><div class="hr"></div><div class="grid2"><div class="paper" style="padding:8px"><b>段位</b><br>${rc.icon} ${rc.name} · ${rankProgressText()}</div><div class="paper" style="padding:8px"><b>胜率</b><br>${state.wins}/${state.total} · ${winrate}%</div></div><div class="paper" style="padding:8px"><b>宝箱进度</b><br><div class="levelBar"><i style="width:${state.chest*10}%"></i></div>${state.chest}/10，赢回合可推进</div></div>
<div class="panel"><b>每日任务</b><div class="hr"></div>${taskLine('完成3局对战',state.tasks.play,3,0)}${taskLine('使用5次功能牌',state.tasks.useSkill,5,1)}${taskLine('赢下6个回合',state.tasks.winRound,6,2)}${taskLine('打出顺子或以上',state.tasks.straight,1,3)}</div>`}
var TASK_REWARDS=[['play',15],['useSkill',15],['winRound',15],['straight',25]]
function taskLine(t,v,max,i){const done=v>=max;return `<div class="shopItem"><div>${done?'✅':'⬜'} ${t}<br><span class="small muted">进度 ${Math.min(v,max)}/${max}</span></div><span class="pill" style="${done?'background:#c9822d;color:#fff':''}" onclick="${done?'claimTask('+i+')':''}">${done?'可领奖':'进行中'}</span></div>`}
function ownedSkills(){return Object.keys(state.skills).filter(id=>(state.skills[id].copies||0)>0).sort((a,b)=>TIERS.indexOf(SM[a].tier)-TIERS.indexOf(SM[b].tier)||SM[a].name.localeCompare(SM[b].name,'zh'))}
function renderDeck(){const owned=ownedSkills();const equipped=state.equipped.filter(id=>(state.skills[id]?.copies||0)>0);state.equipped=equipped;save();let html=`${topbar('功能牌仓库','功能牌为消耗品：带入一局就消耗1张，不走升级')}
<div class="panel"><b>当前带入：${equipped.length}/2</b><div class="hr"></div><div class="grid3">${equipped.map(id=>skillCard(id,true,true,'toggleEquip')).join('')||'<div class="paper">暂无带入牌</div>'}</div></div>`;
for(const tier of TIERS){const list=owned.filter(id=>SM[id].tier===tier);if(!list.length)continue;html+=`<div class="tierHead ${tier}">${tier}<span>${tier==='T0'?'最强级别':tier==='T1'?'高级':tier==='T2'?'中级':'普通'}</span></div><div class="grid3">${list.map(id=>skillCard(id,equipped.includes(id),true,'toggleEquip')).join('')}</div>`}
html+=`<div class="paper small">未抽到或库存为0的功能牌不展示。去抽卡页可获得更多库存。</div>`;q('#app').innerHTML=html}
function skillCard(id,equipped,compact,toggleFn){var s=SM[id],n=state.skills[id]?.copies||0;var fn=toggleFn||'toggleEquip';var btn=compact?'':'<div class="btn dark" style="min-height:30px;padding:4px 0;font-size:11px">'+(equipped?'已带入':'选择带入')+'</div>';var cls='skillCard tier-'+s.tier+(equipped?' equipped':'')+(compact?' compact':'');return '<div class="'+cls+'" onclick="'+fn+'(\''+id+'\')"><span class="countBadge">×'+n+'</span><div class="skillName '+(s.tier==='T0'?'rarity-T0':'')+'">'+s.icon+' '+s.name+'</div><div class="small muted">'+s.tier+' · '+s.type+'</div><div class="skillEffect">'+s.effect+'</div>'+btn+'</div>'}

function claimTask(i){var k=['play','useSkill','winRound','straight'][i],m=[3,5,6,1][i];if(state.tasks[k]<m)return;if(state.tasks[k]===-1)return toast('\u5DF2\u9886\u53D6');state.tasks[k]=-1;state.gems+=TASK_REWARDS[i][1];save();toast('+'+TASK_REWARDS[i][1]+'\u{1F48E}');renderHome()}
function toggleEquip(id){if(!state.skills[id]||state.skills[id].copies<=0)return;let e=state.equipped||[];if(e.includes(id))e=e.filter(x=>x!==id);else{if(e.length>=2)return toast('每局只能带入2张功能牌');e.push(id)}state.equipped=e;save();renderDeck()}
function toggleEquipBattle(id){if(!state.skills[id]||state.skills[id].copies<=0)return;let e=state.equipped||[];if(e.includes(id))e=e.filter(x=>x!==id);else{if(e.length>=2)return toast('每局只能带入2张功能牌');e.push(id)}state.equipped=e;save();renderBattleSelect()}
function renderBattleSelect(){const e=(state.equipped||[]).filter(id=>state.skills[id]?.copies>0);const all=ownedSkills().filter(id=>!e.includes(id));q('#app').innerHTML=`${topbar(state.mode==='ranked'?'天梯准备':'对战准备','直接在此选择2张功能牌带入对局')}
<div class="panel"><b>已选功能牌（点击取消）</b><div class="hr"></div><div class="grid2">${e.length?e.map(id=>skillCard(id,true,true,'toggleEquipBattle')).join(''):'<div class="paper" style="text-align:center;color:#8b7550">请选择2张功能牌</div>'}</div></div>
${all.length?`<div class="panel"><b>可用功能牌（点击选择）</b><div class="hr"></div><div class="grid2">${all.map(id=>skillCard(id,false,true,'toggleEquipBattle')).join('')}</div></div>`:''}
<div class="panel"><b>出牌规则</b><div class="hr"></div><div class="grid3"><div class="paper"><b>第1局</b><br>起手7，打3</div><div class="paper"><b>第2局</b><br>补到7，打3</div><div class="paper"><b>第3局</b><br>补到7，打3</div><div class="paper"><b>第4局</b><br>补到7，打4</div><div class="paper"><b>第5局</b><br>补到7，打5</div><div class="paper"><b>公共牌</b><br>3张固定</div></div></div>
<div class="panel"><b>对手难度</b><div class="hr"></div><div class="difficultyRow"><button class="diffBtn ${state.difficulty===0?'active':''}" onclick="setDifficulty(0)">😴 简单</button><button class="diffBtn ${state.difficulty===1?'active':''}" onclick="setDifficulty(1)">🎯 中等</button><button class="diffBtn ${state.difficulty===2?'active':''}" onclick="setDifficulty(2)">🔥 困难</button></div></div><div class="btn ${e.length===2?'':'disabled'}" onclick="startBattle()">${e.length===2?'开始对战并消耗带入牌':'还需选择'+(2-e.length)+'张功能牌'}</div>`;qa('.skillCard').forEach(function(el){el.onclick=function(){var id=el.getAttribute('onclick');if(id){var m=id.match(/'(.*?)'/);if(m)toggleEquipBattle(m[1])}}})}
function renderChars(){let html=`${topbar('角色','角色正常升级，主要影响局外收益和轻量对局保护')}`;for(const c of CHARS){const cs=state.chars[c.id]||{owned:false,lv:1,shards:0};if(!cs.owned&&cs.shards<=0)continue;html+=`<div class="charCard"><div style="display:flex;gap:10px;align-items:center"><div class="avatar">${c.icon}</div><div style="flex:1"><div class="skillName">${c.name} <span class="pill">Lv.${cs.lv}</span></div><div class="small muted">${c.rarity}</div><div class="skillEffect">${c.effect}</div><div class="levelBar"><i style="width:${Math.min(100,cs.shards/charNeed(cs.lv)*100)}%"></i></div><div class="small muted">碎片 ${cs.shards}/${charNeed(cs.lv)}</div></div></div><div class="grid2" style="margin-top:8px"><div class="btn dark" onclick="activeChar('${c.id}')">${state.activeChar===c.id?'已上阵':'上阵'}</div><div class="btn ${cs.shards>=charNeed(cs.lv)?'':'disabled'}" onclick="upChar('${c.id}')">升级</div></div></div>`}q('#app').innerHTML=html}
function charNeed(lv){return 8+lv*4}function charLv(id){return state.chars[id]?.lv||1}function activeChar(id){if(!state.chars[id]?.owned)return;state.activeChar=id;save();renderChars()}function upChar(id){const c=state.chars[id];const need=charNeed(c.lv);if(c.shards<need||state.coins<need*80)return toast('碎片或金币不足');c.shards-=need;state.coins-=need*80;c.lv++;save();renderChars();toast('角色升级成功')}
function renderShop(){q('#app').innerHTML=`${topbar('抽卡商店','获得功能牌库存与角色碎片')}
<div class="panel"><b>功能牌卡包</b><div class="hr"></div><div class="shopItem"><div>单抽功能牌<br><span class="small muted">随机获得1张功能牌库存</span></div><div class="btn" onclick="drawSkills(1)">💎60</div></div><div class="shopItem"><div>十连功能牌<br><span class="small muted">至少1张T1以上</span></div><div class="btn" onclick="drawSkills(10)">💎540</div></div></div>
<div class="panel"><b>角色招募</b><div class="hr"></div><div class="shopItem"><div>单抽角色<br><span class="small muted">获得角色或碎片</span></div><div class="btn" onclick="drawChars(1)">💎90</div></div><div class="shopItem"><div>十连角色<br><span class="small muted">额外碎片奖励</span></div><div class="btn" onclick="drawChars(10)">💎810</div></div></div>
<div class="panel"><b>测试入口</b><div class="hr"></div><div class="grid2"><div class="btn dark" onclick="state.gems+=500;save();renderShop()">+500钻石</div><div class="btn dark" onclick="state.coins+=3000;save();renderShop()">+3000金币</div></div></div>`}
function drawSkills(n){const cost=n===10?540:60;if(state.gems<cost)return toast('钻石不足');state.gems-=cost;let results=[];for(let i=0;i<n;i++){let pool=SKILLS;let r=Math.random();let tier=r<.06?'T0':r<.23?'T1':r<.55?'T2':'T3';let p=pool.filter(s=>s.tier===tier);let s=p[Math.floor(Math.random()*p.length)];state.skills[s.id]??={copies:0,uses:0};state.skills[s.id].copies++;results.push({icon:s.icon,name:s.name,sub:s.tier})}save();showDraw(results,'功能牌抽取')}
function drawChars(n){const cost=n===10?810:90;if(state.gems<cost)return toast('钻石不足');state.gems-=cost;let results=[];for(let i=0;i<n;i++){let c=CHARS[Math.floor(Math.random()*CHARS.length)],cs=state.chars[c.id]??{owned:false,lv:1,shards:0};if(cs.owned){cs.shards+=3;results.push({icon:c.icon,name:c.name,sub:'重复 +3碎片'})}else{cs.owned=true;results.push({icon:c.icon,name:c.name,sub:'新角色'})}state.chars[c.id]=cs}save();showDraw(results,'角色招募')}
function showDraw(arr,title){const m=document.createElement('div');m.className='modal';m.innerHTML=`<div class="modalBox"><div class="title" style="color:#321707">${title}</div><div class="drawGrid">${arr.map(x=>`<div class="drawReveal"><div class="big">${x.icon}</div><b>${x.name}</b><span class="small muted">${x.sub}</span></div>`).join('')}</div><div class="btn" id="okDraw">确定</div></div>`;document.body.appendChild(m);q('#okDraw').onclick=()=>{m.remove();renderShop()}}

function useSkill(side,id){let a=battle[side],e=battle[side==='player'?'opp':'player'];if(battle.phase!=='select')return;let sk=a.skills[id];if(!sk||sk.used)return toast('该功能牌已用过');if(a.skillUses>=2)return toast('每回合最多使用2张功能牌');a.skillUses++;sk.used=true;sk.charge=0;if(side==='player'){state.tasks.useSkill++;state.skills[id].uses=(state.skills[id].uses||0)+1}log(`${side==='player'?'我方':'对手'}发动【${SM[id].name}】`);flash(`${side==='player'?'我方':'对手'}发动 ${SM[id].icon}${SM[id].name}`);skillBurst();if(side==='opp'){var ntf=document.createElement('div');ntf.className='oppSkillNotice';ntf.innerHTML='<b>⚡ 对手发动 '+SM[id].icon+SM[id].name+'</b><br><span>'+SM[id].effect+'</span>';document.body.appendChild(ntf);setTimeout(function(){ntf.remove()},2200)}applySkill(side,id);save();renderBattle()}
function applySkill(side,id){let a=battle[side],e=battle[side==='player'?'opp':'player'];let own=side==='player'?'我方':'对手',opp=side==='player'?'对手':'我方';let selected=side==='player'?a.hand.filter(c=>battle.selected.includes(c.id)):[];let low=sortCards(a.hand).slice(-1)[0],high=sortCards(a.hand)[0];function add(...cs){a.hand.push(...cs)}function discard(target,cards){for(const c of cards){let i=target.hand.indexOf(c);if(i>=0){target.hand.splice(i,1);target.discard.push(c)}}}
switch(id){case'fivejoker':if(battle.round===5){add({id:'c'+uid++,rank:15,suit:'★',joker:true});add(...draw(battle.deck,1));log(`${own}获得Joker百搭牌并额外抽1张`)}else{add(...draw(battle.deck,1));log(`${own}抽1张牌`)}break;case'magician':if(high){let t=selected[0]||high;add(clone(t));log(`${own}复制 ${rankText(t.rank)}${t.suit}`)}break;case'thief':if(e.hand.length){let c=e.hand.splice(Math.floor(Math.random()*e.hand.length),1)[0];add(c);log(`${own}偷走${opp}1张手牌`)}break;case'fate':{let c=selected[0]||low;if(c){discard(a,[c]);add({id:'c'+uid++,rank:14,suit:c.suit});log(`${own}将 ${rankText(c.rank)}${c.suit} 转化为A${c.suit}`)}}break;case'hacker':if(e.hand.length){let c=e.hand[Math.floor(Math.random()*e.hand.length)];add(clone(c));log(`${own}复制${opp}1张手牌`)}break;case'lucky':a.buff.lucky=true;log(`${own}本回合顺子将视为同花顺`);break;case'destroyer':{let ds=shuffle(e.hand).slice(0,2);discard(e,ds);log(`${own}随机弃掉${opp}${ds.length}张手牌`)}break;case'glove':{let c=clone(battle.community[Math.floor(Math.random()*battle.community.length)]);add(c);log(`${own}复制公共牌 ${rankText(c.rank)}${c.suit}`)}break;case'burst':a.playBonus+=1;log(`${own}本回合可以多打1张牌`);break;case'god':{let r=[12,13,14][Math.floor(Math.random()*3)],s=SUITS[Math.floor(Math.random()*4)];add({id:'c'+uid++,rank:r,suit:s});log(`${own}获得 ${rankText(r)}${s}`)}break;case'plusminus':{let c=selected[0]||low;if(c){let old=c.rank;c.rank=c.rank<14?c.rank+1:c.rank-1;log(`${own}调整 ${rankText(old)}${c.suit} → ${rankText(c.rank)}${c.suit}`)}}break;case'intel':{let cards=draw(battle.deck,2),keep=sortCards(cards)[0];add(keep);log(`${own}抽2选1，保留 ${rankText(keep.rank)}${keep.suit}`)}break;case'inspect':e.revealed=true;log(`${own}查看了${opp}全部手牌`);if(side==='player')showInspect(e.hand);break;case'recycle':{let recent=a.played.slice(-1);if(recent.length){let c=clone(recent[0]);add(c);log(`${own}回收 ${rankText(c.rank)}${c.suit}`)}else{add(...draw(battle.deck,1));log(`${own}无牌可回收，改为抽1张`)}}break;case'lock':e.locked=true;e.playBonus-=1;log(`${opp}本回合少打一张牌`);break;case'shuffle':{let c=selected[0]||low;if(c){discard(a,[c]);add(...draw(battle.deck,2));log(`${own}弃 ${rankText(c.rank)}${c.suit}，抽2张`)}}break;case'rogue':if(a.hand.length&&e.hand.length){let c1=selected[0]||a.hand[0],c2=e.hand[Math.floor(Math.random()*e.hand.length)];a.hand[a.hand.indexOf(c1)]=c2;e.hand[e.hand.indexOf(c2)]=c1;log(`${own}与${opp}交换1张牌`)}break;case'gambler':if(Math.random()<.60){add(...draw(battle.deck,3));log(`${own}幸运赌徒成功，抽3张`)}else if(a.hand.length){let c=a.hand[Math.floor(Math.random()*a.hand.length)];discard(a,[c]);log(`${own}幸运赌徒失败，弃1张`)}break;case'flushbeliever':a.buff.flushBeliever=true;log(`${own}激活同花信徒`);break;case'delay':e.nextDrawPenalty=(e.nextDrawPenalty||0)+1;log(`${opp}下回合少抽1张`);break;case'bomb':if(e.hand.length){let c=e.hand[Math.floor(Math.random()*e.hand.length)];discard(e,[c]);log(`${own}扰乱${opp}1张手牌`)}break;case'charge':a.playBonus-=1;a.nextPlayBonus=(a.nextPlayBonus||0)+1;log(`${own}蓄力：本回合少打1张，下回合多打1张`);break;}}
function submitPlay(){if(battle.phase!=='select')return;let p=battle.player,o=battle.opp,need=roundNeed('player');if(battle.selected.length!==need)return toast('需要选择 '+need+' 张');p.played=p.hand.filter(c=>battle.selected.includes(c.id));p.hand=p.hand.filter(c=>!battle.selected.includes(c.id));p.discard.push(...p.played);aiUseSkills();let on=roundNeed('opp');while(o.hand.length<on)o.hand.push(...draw(battle.deck,1));o.played=chooseBest(o.hand,on,o.buff);o.hand=o.hand.filter(c=>!o.played.includes(c));o.discard.push(...o.played);battle.phase='reveal';battle.selected=[];log('双方亮牌：展示4秒后结算。');renderBattle();flash('对手亮牌');setTimeout(()=>{if(battle&&battle.phase==='reveal')resolveRound()},4000)}
function chooseBest(hand,n,buff){let best=null,score=null;for(const cb of combos(hand,n)){let ev=evaluate([...cb,...battle.community],{...buff,played:cb});if(!score||compare(ev.score,score)>0){best=cb;score=ev.score}}return best||hand.slice(0,n)}
function handCat(hand){return evaluate([...hand,...battle.community],{}).cat}
function aiPickSkill(sit,avail,phase){var diff=Math.min(2,Math.max(0,state.difficulty||1));var isDesp=battle.opp.hp<=1;var isLead=battle.player.hp<=1;var isLate=battle.round>=4;var cand=[];for(var i=0;i<avail.length;i++){var id=avail[i].id,w=AI_W[id];if(!w)continue;var sc=0;if(phase==='start'){sc=w.u*4+(isDesp?w.d*3:w.d)+(isLead?w.o*4:w.o)+(isLate?w.o*3:w.u*2)}else{sc=w.o*3+(isDesp?w.u*2:0)+(isLead?w.d*8:w.d*3)+(isLate?w.o*3:w.u)}sc*=0.7+Math.random()*0.6;cand.push({id,sc})}if(!cand.length)return null;cand.sort(function(a,b){return b.sc-a.sc});var rate=[0.55,0.78,0.95][diff];return Math.random()<rate?cand[0].id:null}
function aiStartSkill(){if(!battle||battle.phase!=='select')return;var o=battle.opp;var avail=Object.values(o.skills).filter(function(s){return!s.used});if(!avail.length)return;var cat=handCat(o.hand);if(cat>=4&&Math.random()<0.65)return;var id=aiPickSkill('start',avail);if(id)useSkill('opp',id)}
function aiUseSkills(){var o=battle.opp;var avail=Object.values(o.skills).filter(function(s){return!s.used});if(!avail.length)return;var id=aiPickSkill('play',avail);if(id)useSkill('opp',id)}
function resolveRound(){let p=battle.player,o=battle.opp;p.buff.played=p.played;o.buff.played=o.played;let pe=evaluate([...p.played,...battle.community],p.buff),oe=evaluate([...o.played,...battle.community],o.buff);let cmp=compare(pe.score,oe.score);let winner=cmp>0?'player':cmp<0?'opp':'tie',dmg=winner==='tie'?0:1;battle.last={winner,pEval:pe,oEval:oe,dmg};if(winner==='player'){o.hp=Math.max(0,o.hp-dmg);battle.roundWins.player++;state.tasks.winRound++;if(pe.cat>=4)state.tasks.straight=1;if(pe.cat>=7)bigHandCelebration(pe.name)}else if(winner==='opp'){p.hp=Math.max(0,p.hp-dmg);battle.roundWins.opp++;if(oe.cat>=7)bigHandCelebration(oe.name)}for(const f of [p,o]){if(f.buff.flushBeliever&&f.played.length>0){var sc={};for(var ci=0;ci<f.played.concat(battle.community).length;ci++){var s=f.played.concat(battle.community)[ci].suit;sc[s]=(sc[s]||0)+1;if(sc[s]>=3){f.nextDrawBonus=(f.nextDrawBonus||0)+2;log(`${f===p?'我方':'对手'}同花信徒触发，下回合额外抽2张`);break}}}}battle.phase='result';log(`本局结果：我方【${pe.name}】 vs 对手【${oe.name}】`);showRoundResult(winner,pe,oe,dmg);save()}
function showRoundResult(winner,pe,oe,dmg){let title=winner==='player'?'本局胜利':winner==='opp'?'本局失败':'本局平局';if(winner!=='tie')softHitFx(winner);var sd='';if(pe.cat!==oe.cat){sd='牌型：我方<b>'+pe.name+'</b>(Lv.'+pe.cat+') vs 对手<b>'+oe.name+'</b>(Lv.'+oe.cat+')，高<b>'+(pe.cat-oe.cat)+'</b>级'}else if(pe.name!==oe.name){sd='同Lv.'+pe.cat+'牌型，我方<b>'+pe.name+'</b> vs 对手<b>'+oe.name+'</b>，我方'+((pe.score[1]||0)>(oe.score[1]||0)?'点数更大':'点数更小')}else{sd='双方相同牌型<b>'+pe.name+'</b>，平局'}let m=document.createElement('div');m.className='resultBanner';m.innerHTML=`<div class="resultBox"><div class="shot">${winner==='tie'?'🤝':'✨'}</div><div class="resultTitle">${title}</div><div style="margin:4px 0;font-size:12px;color:#5a3f20;background:rgba(255,255,255,.2);border-radius:8px;padding:6px">${sd}</div><div class="resultCompare"><div class="resultHandBox"><b>我方牌型（最佳5张）</b><div class="resultHandName">${pe.name}</div><div class="resultCards" style="display:flex;gap:3px;justify-content:center;flex-wrap:wrap;margin:4px 0">${cardsHtml(pe.cards||battle.player.played)}</div></div><div class="resultHandBox"><b>对手牌型（最佳5张）</b><div class="resultHandName">${oe.name}</div><div class="resultCards" style="display:flex;gap:3px;justify-content:center;flex-wrap:wrap;margin:4px 0">${cardsHtml(oe.cards||battle.opp.played)}</div></div></div><div class="resultCards" style="display:flex;gap:3px;justify-content:center;flex-wrap:wrap;margin:4px 0;padding-top:4px;border-top:1px solid rgba(100,60,20,.12)">${cardsHtml(battle.community,'smallCard')}</div><div style="margin:9px 0;font-weight:1000">${winner==='player'?'我方赢下小局，对手 -'+dmg+'♥':winner==='opp'?'对手赢下小局，我方 -'+dmg+'♥':'双方牌型相同，本局不扣血'}</div><div class="grid2"><div class="btn dark" id="review">再看一下</div><div class="btn" id="next">${isOver()?'进入结算':'下一局'}</div></div></div>`;document.body.appendChild(m);q('#review').onclick=()=>{m.remove();renderBattle()};q('#next').onclick=()=>{m.remove();nextRound()}}
function isOver(){return battle.player.hp<=0||battle.opp.hp<=0||battle.round>=5||battle.roundWins.player>=3||battle.roundWins.opp>=3}
function nextRound(){if(isOver())return finishBattle();battle.round++;if(battle.round===3){for(var rk of ['player','opp']){var f=battle[rk];var usd=Object.values(f.skills).filter(function(sk){return sk.used});if(usd.length){var sk=usd[Math.floor(Math.random()*usd.length)];sk.used=false;sk.charge=1;log((rk==='player'?'我方':'对手')+'【'+SM[sk.id].name+'】获得二次使用机会')}}}for(const key of ['player','opp']){let f=battle[key];let target=HAND_LIMIT+(f.nextDrawBonus||0)-(f.nextDrawPenalty||0);let n=Math.max(0,target-f.hand.length);f.hand.push(...draw(battle.deck,n));f.played=[];f.buff={};f.skillUses=0;f.playBonus=f.nextPlayBonus||0;f.nextPlayBonus=0;f.nextDrawBonus=0;f.nextDrawPenalty=0;f.locked=false}battle.selected=[];battle.phase='select';log(`进入第${battle.round}局：手牌补到${HAND_LIMIT}张，基础打${PLAY_COUNTS[battle.round-1]}张`);renderBattle();if(battle.mode==='tutorial'){battle.tutorialStep=Math.min(5,(battle.tutorialStep||1)+1);setTimeout(()=>showTutorialStep(battle.tutorialStep),250)}else setTimeout(aiStartSkill,500)}
function deckLines(deck){return deck.map(s=>`<div class="deckSkillLine"><span>${s.icon} ${s.name}</span><b>${s.tier}</b></div>`).join('')||'<div class="muted">无</div>'}
function finishBattle(){let win=battle.roundWins.player>battle.roundWins.opp||battle.opp.hp<=0;let lose=battle.roundWins.opp>battle.roundWins.player||battle.player.hp<=0;state.tasks.play++;let ladderText;if(battle.mode==='ranked'){ladderText=updateLadder(win)}else{ladderText='快速对战不计天梯';state.total++;if(win)state.wins++}let base=win?320:lose?90:150;let lv=charLv(state.activeChar);if(state.activeChar==='cowboy')base+=Math.floor(base*(0.05+(lv-1)*.02));state.coins+=base;state.gems+=win?12:5;state.rank=Math.max(0,(state.rank||820)+(win?30:lose?-10:0));var oldChest=state.chest;state.chest=Math.min(10,state.chest+(win?2:1));state.history.unshift({win,score:`${battle.roundWins.player}:${battle.roundWins.opp}`,time:Date.now(),mode:battle.mode||'normal'});save();let m=document.createElement('div');m.className='resultBanner';m.innerHTML=`<div class="resultBox"><div class="resultTitle">${win?'对战胜利':lose?'对战失败':'对战平局'}</div><div>盘数：我方 ${battle.roundWins.player} / 对手 ${battle.roundWins.opp}</div><div>最终血量：我方 ${battle.player.hp}♥ / 对手 ${battle.opp.hp}♥</div><div class="finalDeckGrid"><div class="finalDeckBox"><b>我方带入卡组</b>${deckLines(battle.player.skillDeck)}</div><div class="finalDeckBox"><b>对手带入卡组</b>${deckLines(battle.opp.skillDeck)}</div></div><div style="margin:8px 0">获得：金币 ${base}，${ladderText}，宝箱进度 +${win?2:1}</div><div class="grid2"><div class="btn dark" id="rankBtn">查看天梯</div><div class="btn" id="homeBtn">回到主页</div></div></div>`;document.body.appendChild(m);q('#homeBtn').onclick=()=>{m.remove();battle=null;state.mode='normal';setScreen('home')};q('#rankBtn').onclick=()=>{m.remove();battle=null;setScreen('rank')}}
/* poker eval */
function combos(arr,k){let out=[];function rec(start,cur){if(cur.length===k){out.push(cur.slice());return}for(let i=start;i<arr.length;i++)rec(i+1,cur.concat(arr[i]))}rec(0,[]);return out}
function evaluate(cards,buff={}){let js=cards.filter(c=>c.joker);if(js.length){let best=null;for(const r of [14,13,12,11,10,9,8,7,6,5,4,3,2])for(const s of SUITS){let rep=cards.map(c=>c.joker?{...c,rank:r,suit:s,joker:false}:c);let ev=evaluate(rep,buff);if(!best||compare(ev.score,best.score)>0)best=ev}return best}let best=null;for(const cb of combos(cards,5)){let ev=evaluateNoJoker(cb,buff);if(!best||compare(ev.score,best.score)>0)best=ev}return best||evaluateNoJoker(cards,buff)}
function evaluateNoJoker(cs,buff={}){cs=[...cs].sort((a,b)=>b.rank-a.rank);let ranks=cs.map(c=>c.rank),counts={};for(const r of ranks)counts[r]=(counts[r]||0)+1;let groups=Object.entries(counts).map(([r,n])=>({r:+r,n})).sort((a,b)=>b.n-a.n||b.r-a.r);let flush=cs.length>=5&&cs.every(c=>c.suit===cs[0].suit);let uniq=[...new Set(ranks)].sort((a,b)=>b-a);if(uniq.includes(14))uniq.push(1);let straightHigh=0;for(let i=0;i<=uniq.length-5;i++){let seq=uniq.slice(i,i+5);if(seq[0]-seq[4]===4){straightHigh=seq[0];break}}let straight=!!straightHigh;if(buff.lucky&&straight){return{name:'同花顺（幸运日）',cat:8,score:[8,straightHigh],cards:cs}}if(flush&&straight&&straightHigh===14)return{name:'皇家同花顺',cat:9,score:[9,14],cards:cs};if(flush&&straight)return{name:'同花顺',cat:8,score:[8,straightHigh],cards:cs};if(groups[0]?.n===4)return{name:'四条',cat:7,score:[7,groups[0].r,...ranks.filter(r=>r!==groups[0].r)],cards:cs};if(groups[0]?.n===3&&groups[1]?.n>=2)return{name:'葫芦',cat:6,score:[6,groups[0].r,groups[1].r],cards:cs};if(flush)return{name:'同花',cat:5,score:[5,...ranks],cards:cs};if(straight)return{name:'顺子',cat:4,score:[4,straightHigh],cards:cs};if(groups[0]?.n===3)return{name:'三条',cat:3,score:[3,groups[0].r,...ranks.filter(r=>r!==groups[0].r)],cards:cs};if(groups[0]?.n===2&&groups[1]?.n===2){let ps=groups.filter(g=>g.n===2).map(g=>g.r).sort((a,b)=>b-a);return{name:'两对',cat:2,score:[2,...ps,...ranks.filter(r=>!ps.includes(r))],cards:cs}}if(groups[0]?.n===2)return{name:'一对',cat:1,score:[1,groups[0].r,...ranks.filter(r=>r!==groups[0].r)],cards:cs};return{name:'高牌',cat:0,score:[0,...ranks],cards:cs}}
function compare(a,b){for(let i=0;i<Math.max(a.length,b.length);i++){let d=(a[i]||0)-(b[i]||0);if(d)return d}return 0}
function cardsText(a){return (a||[]).map(c=>`${rankText(c.rank)}${c.suit}`).join('、')||'无'}
function cardsHtml(a,cls){return (a||[]).map(function(c){return cardHtml(c,cls||'smallCard')}).join('')}function log(t){if(!battle)return;battle.logs.unshift(`<div>${new Date().toLocaleTimeString().slice(0,8)} · ${t}</div>`)}function showLog(){let m=document.createElement('div');m.className='modal';m.innerHTML=`<div class="modalBox"><div class="title" style="color:#321707">📜 战斗日志</div><div class="log">${battle.logs.join('')||'<div>暂无日志。</div>'}</div><div class="btn" id="closeLog" style="margin-top:12px">关闭</div></div>`;document.body.appendChild(m);q('#closeLog').onclick=()=>m.remove();m.onclick=e=>{if(e.target===m)m.remove()}}
function showInspect(hand){let m=document.createElement('div');m.className='modal';m.innerHTML=`<div class="modalBox"><div class="title" style="color:#321707">🔍 对手手牌</div><div class="cardRow">${sortCards(hand).map(c=>cardHtml(c,'smallCard')).join('')}</div><div class="btn" id="closeInsp">知道了</div></div>`;document.body.appendChild(m);q('#closeInsp').onclick=()=>m.remove()}
function showHandRankingRef(){var h=[['皇家同花顺','A-K-Q-J-10 同花色'],['同花顺','5张连续同花色'],['四条','4张相同点数'],['葫芦','3张相同+1对'],['同花','5张同花色'],['顺子','5张连续点数'],['三条','3张相同点数'],['两对','2个对子'],['一对','1个对子'],['高牌','无组合，比最大单张']];var m=document.createElement('div');m.className='modal';m.innerHTML='<div class="modalBox" style="max-height:70vh"><div class="title" style="color:#321707;font-size:18px;margin-bottom:8px">牌型速查</div><div style="font-size:11px;color:#8b7550;margin-bottom:6px">你打出的牌 + 公共牌 = 最佳5张组合</div>'+h.map(function(x,i){return '<div class="teachHand"><span><b>'+(i+1)+'. '+x[0]+'</b></span><span style="font-size:10px;color:#8b7550">'+x[1]+'</span></div>'}).join('')+'<div class="btn" id="closeRef" style="margin-top:10px">关闭</div></div>';document.body.appendChild(m);q('#closeRef').onclick=function(){m.remove()};m.onclick=function(e){if(e.target===m)m.remove()}}
function bestCardIds(ev){return new Set((ev&&ev.cards||[]).map(function(c){return c.id}))}
function flash(t){let d=document.createElement('div');d.className='flashText';d.textContent=t;document.body.appendChild(d);setTimeout(()=>d.remove(),1100)}function skillBurst(){let d=document.createElement('div');d.className='skillBurstFx';document.body.appendChild(d);setTimeout(()=>d.remove(),700);navigator.vibrate&&navigator.vibrate(20)}
function bigHandCelebration(name){var d=document.createElement('div');d.className='bigHandCelebration';d.innerHTML='<div class="bigHandText">\u{1F525} '+name+' \u{1F525}</div>';document.body.appendChild(d);setTimeout(function(){d.remove()},1600);navigator.vibrate&&navigator.vibrate([30,50,30])}function softHitFx(winner){var ph=q('.phone');if(ph){ph.classList.add('shakeScreen');setTimeout(function(){ph.classList.remove('shakeScreen')},320)}var rf=document.createElement('div');rf.style.cssText='position:fixed;inset:0;z-index:55;background:rgba(220,30,30,.15);pointer-events:none;animation:bhFade .35s ease both';document.body.appendChild(rf);setTimeout(function(){rf.remove()},350);var dm=document.createElement('div');dm.style.cssText='position:fixed;z-index:56;font-size:32px;font-weight:1000;color:#e03a2b;pointer-events:none;animation:bhPop .45s ease both;text-shadow:0 2px 0 rgba(0,0,0,.3)';dm.textContent='-1';dm.style.left=winner==='player'?'58%':'42%';dm.style.top=winner==='player'?'22%':'78%';document.body.appendChild(dm);setTimeout(function(){dm.remove()},550);let i=document.createElement('div');i.className='impact';i.textContent='✨';i.style.left=winner==='player'?'58%':'42%';i.style.top=winner==='player'?'22%':'78%';document.body.appendChild(i);setTimeout(()=>i.remove(),650)}
function toast(t){let old=q('.toast');if(old)old.remove();let d=document.createElement('div');d.className='toast';d.textContent=t;document.body.appendChild(d);setTimeout(()=>d.remove(),1800)}
load();render('home');
</script>
