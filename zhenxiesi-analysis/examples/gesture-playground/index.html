<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>手势游乐场</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;overflow:hidden;font-family:system-ui,sans-serif;touch-action:none}
canvas{display:block}
#tip{position:fixed;bottom:20px;left:0;right:0;text-align:center;color:rgba(255,255,255,.35);font-size:12px;z-index:10;padding:0 16px;pointer-events:none}
#toolbar{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);display:flex;gap:6px;z-index:10;pointer-events:auto;background:rgba(255,255,255,.08);backdrop-filter:blur(12px);padding:5px 10px;border-radius:18px}
#toolbar .btn{background:rgba(255,255,255,.1);border:none;color:rgba(255,255,255,.7);padding:5px 12px;border-radius:10px;font-size:11px;cursor:pointer;transition:all .2s;pointer-events:auto}
#toolbar .btn.on{background:rgba(100,180,255,.4);color:#fff}
#status{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:10;color:rgba(255,255,255,.25);font-size:11px;pointer-events:none}
</style>
</head>
<body>
<div id="status">加载中...</div>
<div id="tip">🎈 张开手 → 生成 · 握拳 → 消除 · 移动 → 控制</div>
<div id="toolbar">
  <button class="btn on" data-m="spawn">✨ 生成</button>
  <button class="btn" data-m="push">🌊 推动</button>
  <button class="btn" data-m="paint">🎨 涂鸦</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ====== Three Scene ======
const sc = new THREE.Scene(); sc.background = new THREE.Color(0x0a0a1a);
const ca = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 50);
ca.position.set(0, 0, 12);
const re = new THREE.WebGLRenderer({ antialias: true });
re.setSize(innerWidth, innerHeight); re.setPixelRatio(Math.min(devicePixelRatio, 2));
document.body.prepend(re.domElement);

// Ground stars
const g = new THREE.BufferGeometry();
const p = new Float32Array(1500*3);
for (let i = 0; i < 1500; i++) {
  p[i*3] = (Math.random()-0.5)*25; p[i*3+1] = (Math.random()-0.5)*18; p[i*3+2] = (Math.random()-0.5)*10-2;
}
g.setAttribute('position', new THREE.BufferAttribute(p, 3));
const star = new THREE.Points(g, new THREE.PointsMaterial({ color: 0x334488, size: 0.05, transparent: true, opacity: 0.3 }));
sc.add(star);

// Objects pool
const objs = [];
const COL = [0x4f8cff, 0xa855f7, 0x22c55e, 0xf59e0b, 0xef4444, 0xec4899, 0x06b6d4];

function makeObj(x,y,z,sz) {
  const g = new THREE.IcosahedronGeometry(sz||(0.15+Math.random()*0.25), 1);
  const m = new THREE.MeshPhongMaterial({ color: COL[Math.floor(Math.random()*COL.length)], emissive: 0x222244, emissiveIntensity: 0.2, transparent: true, opacity: 0.85 });
  const o = new THREE.Mesh(g, m);
  o.position.set(x,y,z);
  o.userData = { vx: (Math.random()-0.5)*0.03, vy: (Math.random()-0.5)*0.03, vz: (Math.random()-0.5)*0.03, life: 300 };
  sc.add(o); objs.push(o);
}
function burst(x,y,z,n) {
  for (let i=0;i<(n||15);i++) {
    const sz = 0.04+Math.random()*0.08;
    const g = new THREE.SphereGeometry(sz,6,6);
    const m = new THREE.MeshPhongMaterial({ color: COL[Math.floor(Math.random()*COL.length)], emissive: 0x444466, emissiveIntensity: 0.4, transparent: true, opacity: 0.9 });
    const o = new THREE.Mesh(g,m);
    o.position.set(x,y,z);
    o.userData = { vx: (Math.random()-0.5)*0.3, vy: (Math.random()-0.5)*0.3, vz: (Math.random()-0.5)*0.3, life: 60, fade: true };
    sc.add(o); objs.push(o);
  }
}

// Ambient + directional
sc.add(new THREE.AmbientLight(0x334466));
const dl = new THREE.DirectionalLight(0xffffff, 0.6); dl.position.set(2,3,4); sc.add(dl);

// ====== Hand tracking via simple skin detection ======
let hx=0, hy=0, hpx=0, hsp=0;
let handSz=0, prevHandSz=0;
let handOn = false;
let mode = 'spawn';
let ptimer = 0;

document.querySelectorAll('.btn').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('.btn').forEach(x => x.classList.remove('on'));
    b.classList.add('on'); mode = b.dataset.m;
    document.getElementById('tip').textContent =
      mode==='spawn'?'🎈 张开→生成 · 握拳→消除' :
      mode==='push'?'🌊 挥手推动物体' :
      '🎨 移动涂鸦 · 握拳清除';
  });
});

async function init() {
  // Camera timeout - fallback to touch after 3s
  const timeout = setTimeout(() => {
    document.getElementById('status').textContent = '摄像头超时，使用触摸控制';
    fallback();
  }, 3000);

  try {
    const v = document.createElement('video');
    v.width=160; v.height=120; v.playsInline=true; v.muted=true;
    v.style.position='fixed'; v.style.top='-9999px';
    v.srcObject = await navigator.mediaDevices.getUserMedia({ video: { facingMode:'user', width:160, height:120 } });
    await v.play(); document.body.appendChild(v);

    const c = document.createElement('canvas');
    c.width=160; c.height=120;
    const cx = c.getContext('2d');
    document.getElementById('status').textContent = '摄像头已开启';
    clearTimeout(timeout);

    function tick() {
      cx.drawImage(v,0,0,160,120);
      const d = cx.getImageData(0,0,160,120).data;
      let tx=0, ty=0, tc=0;
      for(let y=0;y<120;y+=3) for(let x=0;x<160;x+=3) {
        const i=(y*160+x)*4, r=d[i], g=d[i+1], b=d[i+2];
        if(r>70 && g>40 && b>20 && r>g+10 && r>b+10) { tx+=x; ty+=y; tc++; }
      }
      prevHandSz = handSz;
      handSz = tc;
      if(tc>15) {
        hpx = hx; hx = (tx/tc/80-1); hy = -(ty/tc/60-1);
        hsp = hx - hpx;
        handOn = true;

        const hx3 = hx*6, hy3 = hy*5;
        const isOpen = tc > 60;
        const wasOpen = prevHandSz > 60;

        if(mode==='spawn') {
          if(isOpen && !wasOpen) burst(hx3,hy3,0,12);
          if(!isOpen && wasOpen) {
            // Fist = destroy nearby
            for(let i=objs.length-1;i>=0;i--) {
              const o=objs[i];
              if(Math.sqrt((o.position.x-hx3)**2+(o.position.y-hy3)**2+(o.position.z)**2)<2.5) {
                sc.remove(o); objs.splice(i,1);
              }
            }
          }
        } else if(mode==='push') {
          objs.forEach(o => {
            const dx=o.position.x-hx3, dy=o.position.y-hy3, dz=o.position.z;
            const d2=Math.sqrt(dx*dx+dy*dy+dz*dz)||1;
            if(d2<3.5) {
              const f=0.04/(d2*0.3+0.3);
              o.userData.vx+=dx/d2*f; o.userData.vy+=dy/d2*f;
            }
          });
        } else if(mode==='paint') {
          ptimer++;
          if(ptimer%3===0) makeObj(hx3+(Math.random()-0.5)*0.2, hy3+(Math.random()-0.5)*0.2, 0, 0.08);
          if(!isOpen && wasOpen) {
            for(let i=objs.length-1;i>=0;i--) {
              const o=objs[i];
              if(o.userData.life<600 && o.geometry.type==='IcosahedronGeometry') {
                sc.remove(o); objs.splice(i,1);
              }
            }
          }
        }
      } else handOn = false;
      requestAnimationFrame(tick);
    }
    tick();
  } catch(e) {
    clearTimeout(timeout);
    document.getElementById('status').textContent = '摄像头不可用，使用触摸控制';
    fallback();
  }
}

function fallback() {
  document.addEventListener('touchstart', e => {
    if(e.touches.length===1) {
      const t=e.touches[0]; hx=(t.clientX/innerWidth-.5)*2; hy=-(t.clientY/innerHeight-.5)*2;
      burst(hx*6,hy*5,0,8);
    }
  });
  document.addEventListener('touchmove', e => {
    if(e.touches.length===1) {
      const t=e.touches[0]; hx=(t.clientX/innerWidth-.5)*2; hy=-(t.clientY/innerHeight-.5)*2;
      if(mode==='paint') makeObj(hx*6+(Math.random()-0.5)*0.2, hy*5+(Math.random()-0.5)*0.2, 0, 0.08);
    }
    if(e.touches.length===2 && mode==='push') {
      objs.forEach(o => {
        const dx=o.position.x-hx*6, dy=o.position.y-hy*5;
        const d=Math.sqrt(dx*dx+dy*dy)||1;
        if(d<3) { o.userData.vx+=dx/d*0.02; o.userData.vy+=dy/d*0.02; }
      });
    }
  }, {passive:true});
}

init();

// ====== Game Loop ======
const cl = new THREE.Clock();
function anim(){
  requestAnimationFrame(anim);
  const t=cl.getElapsedTime();

  for(let i=objs.length-1;i>=0;i--) {
    const o=objs[i];
    o.position.x+=o.userData.vx||0; o.position.y+=o.userData.vy||0; o.position.z+=o.userData.vz||0;
    o.rotation.x+=0.02; o.rotation.y+=0.03;
    if(o.userData.vx) o.userData.vx*=0.97;
    if(o.userData.vy) o.userData.vy*=0.97;
    if(o.userData.vz) o.userData.vz*=0.97;
    o.userData.life = (o.userData.life||300)-1;
    if(o.userData.fade) { o.material.opacity=Math.max(0,o.userData.life/60); o.scale.setScalar(1+(60-o.userData.life)*0.03); }
    if(o.userData.life<=0) { sc.remove(o); objs.splice(i,1); }
  }
  while(objs.length>250) { const o=objs.shift(); sc.remove(o); }

  ca.position.x=Math.sin(t*0.04)*2+hx*1.2; ca.position.y=hy*1.2; ca.lookAt(0,0,-1);
  re.render(sc,ca);
}
anim();

addEventListener('resize',()=>{ca.aspect=innerWidth/innerHeight;ca.updateProjectionMatrix();re.setSize(innerWidth,innerHeight)});
</script>
</body>
</html>
