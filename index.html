<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>gh.lirare.xyz</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@200;300;400;500&family=Inter:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

  :root {
    --bg: #000;
    --text: rgba(255,255,255,0.92);
    --dim: rgba(255,255,255,0.45);
    --faint: rgba(255,255,255,0.2);
    --hairline: rgba(255,255,255,0.06);
    --hover: rgba(255,255,255,0.08);
  }

  body {
    background: var(--bg);
    font-family: 'Inter', 'Noto Sans SC', -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    letter-spacing: 0.02em;
    overflow-x: hidden;
  }

  /* ===== Ambient Light ===== */
  .light-source {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100vw;
    max-width: 1200px;
    height: 70vh;
    background: radial-gradient(ellipse at 50% 100%, rgba(120,120,140,0.06) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* ===== Main Layout ===== */
  .main {
    position: relative;
    z-index: 1;
    max-width: 800px;
    margin: 0 auto;
    padding: 12vh 32px 10vh;
  }

  /* ===== Header ===== */
  .header {
    margin-bottom: 16vh;
  }

  .header .tagline {
    font-size: clamp(0.65rem, 0.9vw, 0.72rem);
    font-weight: 400;
    letter-spacing: 0.35em;
    color: var(--faint);
    margin-bottom: 2.5rem;
  }

  .header h1 {
    font-size: clamp(2.2rem, 5vw, 3.6rem);
    font-weight: 200;
    line-height: 1.15;
    letter-spacing: -0.02em;
    color: rgba(255,255,255,0.9);
    max-width: 20ch;
  }

  /* ===== Project Grid ===== */
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    margin-bottom: 10vh;
  }

  .project {
    position: relative;
    padding: 40px 28px;
    text-decoration: none;
    color: inherit;
    border-bottom: 1px solid var(--hairline);
    transition: background 0.4s ease;
  }

  .project::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(255,255,255,0.03) 0%, transparent 70%);
    opacity: 0;
    transition: opacity 0.5s ease;
  }

  .project:hover {
    background: var(--hover);
  }

  .project:hover::after {
    opacity: 1;
  }

  .project .index {
    font-size: 0.65rem;
    font-weight: 400;
    letter-spacing: 0.25em;
    color: var(--faint);
    margin-bottom: 2rem;
  }

  .project .title {
    font-size: 1.25rem;
    font-weight: 300;
    letter-spacing: -0.01em;
    color: rgba(255,255,255,0.9);
    margin-bottom: 0.6rem;
    line-height: 1.3;
  }

  .project .desc {
    font-size: 0.82rem;
    font-weight: 300;
    color: var(--dim);
    line-height: 1.7;
    max-width: 24ch;
  }

  /* ===== Section Title ===== */
  .section-title {
    font-size: 0.65rem;
    font-weight: 400;
    letter-spacing: 0.35em;
    color: var(--faint);
    margin-bottom: 2rem;
    padding-bottom: 1.2rem;
    border-bottom: 1px solid var(--hairline);
  }

  /* ===== Footer ===== */
  .footer {
    margin-top: 14vh;
    padding-top: 2rem;
    border-top: 1px solid var(--hairline);
    font-size: 0.7rem;
    font-weight: 300;
    letter-spacing: 0.2em;
    color: var(--faint);
    display: flex;
    justify-content: space-between;
  }

  .footer a {
    color: var(--dim);
    text-decoration: none;
    transition: color 0.3s;
  }

  .footer a:hover { color: rgba(255,255,255,0.7); }

  /* ===== Cursor Glow ===== */
  .cursor-glow {
    position: fixed;
    width: 400px;
    height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,255,0.025) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
    transform: translate(-50%, -50%);
    opacity: 0;
    transition: opacity 0.3s;
  }

  @media (max-width: 640px) {
    .grid {
      grid-template-columns: 1fr;
    }
    .main {
      padding: 8vh 20px 8vh;
    }
    .header {
      margin-bottom: 10vh;
    }
    .project {
      padding: 28px 16px;
    }
    .footer {
      flex-direction: column;
      gap: 8px;
    }
  }
</style>
</head>
<body>

<div class="light-source"></div>
<div class="cursor-glow" id="glow"></div>

<main class="main">

  <header class="header">
    <div class="tagline">GH.LIRARE.XYZ</div>
    <h1>游戏社群数据<br>分析与产品洞察</h1>
  </header>

  <div class="section-title">报告</div>

  <div class="grid">

    <a class="project" href="https://linirare.github.io/xiuxing-chat-report/">
      <div class="index">01</div>
      <div class="title">修行那些年 · 聊天分析</div>
      <div class="desc">活跃度趋势、话题分布、关键词追踪与运营建议</div>
    </a>

    <a class="project" href="https://linirare.github.io/xiuxing-chat-analytics/">
      <div class="index">02</div>
      <div class="title">修行那些年 · 深度分析</div>
      <div class="desc">多维度数据挖掘、用户行为画像、情感趋势</div>
    </a>

    <a class="project" href="https://linirare.github.io/game-chat-report/">
      <div class="index">03</div>
      <div class="title">游戏聊天报告 v1</div>
      <div class="desc">多游戏社群数据汇总与横向对比</div>
    </a>

    <a class="project" href="https://linirare.github.io/game-chat-report-v2/">
      <div class="index">04</div>
      <div class="title">游戏聊天报告 v2</div>
      <div class="desc">新版多游戏分析、改进的可视化呈现</div>
    </a>

    <a class="project" href="https://linirare.github.io/chat-analysis-report/">
      <div class="index">05</div>
      <div class="title">通用聊天分析</div>
      <div class="desc">跨游戏汇总、情感分析、高频话题提炼</div>
    </a>

    <a class="project" href="https://linirare.github.io/qq-txt-report/">
      <div class="index">06</div>
      <div class="title">QQ 群聊纯文本报告</div>
      <div class="desc">原始消息文本存档、全文检索</div>
    </a>

    <a class="project" href="suggestions.html" style="grid-column: 1 / -1;">
      <div class="index">07</div>
      <div class="title">修行那些年 · 产品优化建议</div>
      <div class="desc">13 条 P0-P2 优化方向，基于社群反馈整理</div>
    </a>

  </div>

  <footer class="footer">
    <span>GITHUB PAGES</span>
    <a href="https://github.com/linirare/xiuxing-optimization-suggestions">gh.lirare.xyz</a>
  </footer>

</main>

<script>
  const glow = document.getElementById('glow');
  document.addEventListener('mousemove', (e) => {
    glow.style.left = e.clientX + 'px';
    glow.style.top = e.clientY + 'px';
    glow.style.opacity = '1';
  });
  document.addEventListener('mouseleave', () => { glow.style.opacity = '0'; });
</script>

</body>
</html>
